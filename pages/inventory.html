<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmont Resto | Inventori Bahan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Shared Integration Script -->
    <script src="../js/shared.js"></script>

    <style>
        :root {
            --bg-dark: #1E1512; --bg-warm: #3A261D; --panel-bg: #FDF8F5;
            --panel-border: #4A332A; --panel-header: #4A332A; --text-main: #4A332A;
            --text-muted: #9A7B6D; --accent-primary: #D66D40; --accent-shadow: #B25028;
            --accent-yellow: #F4BA41; --accent-green: #5D8A56; --accent-blue: #4A90E2;
            --input-bg: #FFFFFF; --input-border: #E8D8D0; --font-game: 'Nunito', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-warm) 0%, var(--bg-dark) 100%);
            color: var(--text-main); font-family: var(--font-game); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 20px;
        }

        .particle { position: absolute; background: rgba(253, 248, 245, 0.3); border-radius: 50%; pointer-events: none; animation: floatUp infinite linear; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 30% { opacity: 0.6; } 70% { opacity: 0.6; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .p1 { width: 6px; height: 6px; left: 15%; animation-duration: 14s; }
        .p2 { width: 10px; height: 10px; left: 35%; animation-duration: 19s; animation-delay: 4s; }
        .p3 { width: 5px; height: 5px; left: 65%; animation-duration: 11s; animation-delay: 2s; }
        .p4 { width: 12px; height: 12px; left: 82%; animation-duration: 22s; animation-delay: 7s; background: rgba(244, 186, 65, 0.15); }
        .p5 { width: 8px; height: 8px; left: 55%; animation-duration: 16s; animation-delay: 9s; }

        .game-window { width: 100%; max-width: 1100px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.85) translateY(30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .game-ui-card { background-color: var(--panel-bg); border: 4px solid var(--panel-border); border-radius: 24px; box-shadow: 0 10px 0 var(--panel-border), 0 20px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        .window-header { background-color: var(--panel-header); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--panel-border); }
        .window-dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: var(--panel-bg); opacity: 0.5; border: 2px solid rgba(0,0,0,0.2); }
        .dot:nth-child(1) { background-color: #FF5F56; opacity: 1;} .dot:nth-child(2) { background-color: #FFBD2E; opacity: 1;} .dot:nth-child(3) { background-color: #27C93F; opacity: 1;}
        .window-title { color: var(--panel-bg); font-size: 0.8rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }

        .card-body { padding: 2rem; display: flex; flex-direction: column; height: 85vh; max-height: 750px; overflow-y: auto; }
        .card-body::-webkit-scrollbar { width: 8px; } .card-body::-webkit-scrollbar-thumb { background: var(--input-border); border-radius: 10px; }

        .page-title { font-size: 1.8rem; font-weight: 900; color: var(--text-main); margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }

        .tester-bar { background: #FFF9C4; border: 3px solid var(--accent-yellow); border-radius: 16px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap; }
        .tester-title { font-size: 0.85rem; font-weight: 900; color: var(--panel-border); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }

        .source-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--input-border); padding: 6px; border-radius: 16px; border: 2px solid var(--panel-border); width: fit-content; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); font-family: var(--font-game); font-weight: 900; font-size: 0.95rem; padding: 8px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .tab-btn.active { background: var(--panel-bg); color: var(--accent-primary); border: 2px solid var(--panel-border); box-shadow: 0 3px 0 rgba(0,0,0,0.1); }

        .grid-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }

        .panel-box { background: var(--input-bg); border: 3px solid var(--input-border); border-radius: 20px; padding: 20px; }
        .panel-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .inv-card { background: var(--panel-bg); border: 3px solid var(--input-border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .inv-card.selected { border-color: var(--accent-primary); box-shadow: 0 0 10px rgba(214, 109, 64, 0.2); }
        .inv-icon { font-size: 2.5rem; color: var(--text-muted); margin-bottom: 10px; }
        .inv-name { font-weight: 900; font-size: 1rem; margin-bottom: 8px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .inv-qty { font-size: 1.4rem; font-weight: 900; color: var(--text-main); margin-bottom: 10px; }
        .btn-select-card { padding: 6px 12px; font-size: 0.75rem; background: var(--input-border); border-radius: 8px; border: 2px solid var(--panel-border); cursor: pointer; font-weight: 800; font-family: var(--font-game); }
        .btn-select-card.active { background: var(--accent-primary); color: white; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; color: var(--text-main); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 3px solid var(--input-border); border-radius: 12px; font-family: var(--font-game); font-weight: 700; color: var(--text-main); outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: var(--panel-border); }

        .btn-game { padding: 12px 20px; color: white; font-weight: 900; font-size: 1rem; font-family: var(--font-game); text-transform: uppercase; letter-spacing: 1px; border: 3px solid var(--panel-border); border-radius: 14px; cursor: pointer; transition: all 0.1s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 5px 0 var(--panel-border); }
        .btn-game:active { transform: translateY(5px); box-shadow: 0 0px 0 transparent; margin-bottom: 5px; }
        .btn-primary { background: var(--accent-primary); box-shadow: 0 5px 0 var(--accent-shadow); }
        .btn-green { background: var(--accent-green); box-shadow: 0 5px 0 #3E5E39; border-color: var(--panel-border); }

        .movement-list { margin-top: 15px; max-height: 200px; overflow-y: auto; border: 2px dashed var(--input-border); border-radius: 12px; padding: 10px; }
        .movement-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 700; padding: 6px 0; border-bottom: 1px dashed var(--input-border); }
        .movement-item:last-child { border-bottom: none; }
        .m-in { color: var(--accent-green); } .m-out { color: #E74C3C; }

        .bottom-actions { margin-top: auto; padding-top: 1.5rem; border-top: 3px dashed var(--input-border); display: flex; justify-content: space-between; align-items: center; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 800; }
        .back-link:hover { color: var(--accent-primary); }

        .forbidden-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; background: rgba(253, 248, 245, 0.95); border-radius: 20px; border: 3px dashed #E74C3C; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="particle p1"></div><div class="particle p2"></div>
    <div class="particle p3"></div><div class="particle p4"></div><div class="particle p5"></div>

    <div class="game-window">
        <div class="game-ui-card">
            <div class="window-header">
                <div class="window-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="window-title">Inventory_System.exe</div>
                <div class="window-dots" style="visibility: hidden;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>

            <div class="card-body">
                <div class="tester-bar">
                    <div class="tester-title"><i class="ph-bold ph-shield-check"></i> SIMULATOR HAK AKSES PENGGUNA (ROLE MATRIX)</div>
                    <div>
                        <select id="role-selector" onchange="changeSimulatedRole()" style="padding: 6px 12px; font-family: var(--font-game); font-weight: 800; border-radius: 8px; border: 2px solid var(--panel-border);">
                            <option value="intern">Lance (Lvl 0) - Akses Warlok saja</option>
                            <option value="senior-chef">Silas (Lvl 2) - Akses Warlok saja</option>
                            <option value="svp" selected>Kael Percival (SVP - Lvl 4) - Akses Semua</option>
                            <option value="ceo">Moza Leonardo (CEO - Lvl 6) - Akses Semua</option>
                        </select>
                    </div>
                </div>

                <h1 class="page-title"><i class="ph-fill ph-package" style="color: var(--accent-green)"></i> Inventori Stok Bahan</h1>

                <div class="source-tabs">
                    <button class="tab-btn active" id="tab-warlok" onclick="switchSource('warlok')"><i class="ph-bold ph-users-three"></i> Warlok (Umum)</button>
                    <button class="tab-btn" id="tab-supplier" onclick="switchSource('supplier')"><i class="ph-bold ph-truck"></i> Supplier (Khusus Lvl 4+)</button>
                </div>

                <div class="forbidden-overlay" id="forbidden-panel">
                    <i class="ph-bold ph-lock-key" style="font-size: 4rem; color: #E74C3C; margin-bottom: 15px;"></i>
                    <h2 style="color: #C0392B; font-weight: 900; margin-bottom: 10px;">Akses Ditolak (403 Forbidden)</h2>
                    <p style="color: var(--text-main); font-weight: 700;">Halaman Inventori Supplier hanya dapat diakses oleh Level 4 (SVP) ke atas.</p>
                </div>

                <div class="grid-layout" id="main-content-layout">
                    <div>
                        <div class="panel-box" style="height: 100%;">
                            <div class="panel-title" id="grid-title"><i class="ph-bold ph-grid-nine" style="color: var(--accent-green)"></i> Stok Barang</div>
                            <div class="inv-grid" id="items-grid-container"></div>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div class="panel-box">
                            <div class="panel-title"><i class="ph-bold ph-arrows-left-right" style="color: var(--accent-primary)"></i> Catat Mutasi Barang</div>
                            <form id="movement-form" onsubmit="handleMovementSubmit(event)">
                                <div class="form-group">
                                    <label>Barang Terpilih</label>
                                    <input type="text" id="move-item-display" readonly style="background: var(--input-border); cursor: not-allowed;" placeholder="Pilih barang di sebelah kiri...">
                                    <input type="hidden" id="move-item-id">
                                </div>
                                <div class="form-group">
                                    <label for="move-type">Jenis Mutasi</label>
                                    <select id="move-type" required>
                                        <option value="IN">IN (Barang Masuk / Tambah Stok)</option>
                                        <option value="OUT">OUT (Barang Keluar / Kurang Stok)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="move-qty">Jumlah Mutasi (Harus &gt; 0)</label>
                                    <input type="number" id="move-qty" min="1" required placeholder="misal: 10">
                                </div>
                                <div class="form-group">
                                    <label for="move-notes">Catatan / Referensi</label>
                                    <input type="text" id="move-notes" placeholder="misal: Restock mingguan">
                                </div>
                                <button type="submit" class="btn-game btn-primary" style="width: 100%;"><i class="ph-bold ph-floppy-disk"></i> Simpan Mutasi</button>
                            </form>
                        </div>

                        <div class="panel-box" id="add-item-panel">
                            <div class="panel-title"><i class="ph-bold ph-plus-circle" style="color: var(--accent-blue)"></i> Tambah Item Baru</div>
                            <form id="add-item-form" onsubmit="handleAddItemSubmit(event)">
                                <div class="form-group">
                                    <label for="new-item-name">Nama Barang</label>
                                    <input type="text" id="new-item-name" placeholder="misal: KEMASAN SAPI" required>
                                </div>
                                <div class="form-group">
                                    <label for="new-item-qty">Stok Awal</label>
                                    <input type="number" id="new-item-qty" min="0" value="0" required>
                                </div>
                                <button type="submit" class="btn-game btn-green" style="width: 100%;"><i class="ph-bold ph-plus"></i> Tambah Item</button>
                            </form>
                        </div>

                        <div class="panel-box">
                            <div class="panel-title"><i class="ph-bold ph-clock-counter-clockwise" style="color: var(--text-muted)"></i> Riwayat Pergerakan</div>
                            <div class="movement-list" id="movement-history-container"></div>
                        </div>
                    </div>
                </div>

                <div class="bottom-actions">
                    <a href="dashboard.html" class="back-link"><i class="ph-bold ph-arrow-left"></i> Kembali ke Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultWarlokItems = [
            { id: "w1", name: "ES BATU", qty: 12, icon: "ph-drop" },
            { id: "w2", name: "GULA", qty: 15, icon: "ph-cube" },
            { id: "w3", name: "GARAM", qty: 8, icon: "ph-grid-four" },
            { id: "w4", name: "TELUR AYAM", qty: 120, icon: "ph-circle" },
            { id: "w5", name: "KEMASAN AYAM", qty: 45, icon: "ph-package" }
        ];
        const defaultSupplierItems = [
            { id: "s1", name: "KEMASAN ANGGUR", qty: 50, icon: "ph-package" },
            { id: "s2", name: "KEMASAN SAPI", qty: 30, icon: "ph-package" },
            { id: "s3", name: "KEMASAN TEH", qty: 200, icon: "ph-package" },
            { id: "s4", name: "KEMASAN JERUK", qty: 80, icon: "ph-package" }
        ];
        const defaultMovementLogs = [
            { item: "ES BATU", source: "warlok", type: "IN", qty: 10, notes: "Restock gudang", time: "Baru saja" },
            { item: "KEMASAN SAPI", source: "supplier", type: "OUT", qty: 5, notes: "Dipakai pesanan", time: "5 menit lalu" }
        ];

        let warlokItems = JSON.parse(localStorage.getItem('velmont_inventory_warlok')) || defaultWarlokItems;
        let supplierItems = JSON.parse(localStorage.getItem('velmont_inventory_supplier')) || defaultSupplierItems;
        let movementLogs = JSON.parse(localStorage.getItem('velmont_inventory_logs')) || defaultMovementLogs;

        if (!localStorage.getItem('velmont_inventory_warlok')) localStorage.setItem('velmont_inventory_warlok', JSON.stringify(warlokItems));
        if (!localStorage.getItem('velmont_inventory_supplier')) localStorage.setItem('velmont_inventory_supplier', JSON.stringify(supplierItems));
        if (!localStorage.getItem('velmont_inventory_logs')) localStorage.setItem('velmont_inventory_logs', JSON.stringify(movementLogs));

        let currentSource = "warlok";
        let simulatedRole = "svp";
        let selectedItem = null;

        function changeSimulatedRole() {
            simulatedRole = document.getElementById("role-selector").value;
            checkPermissions();
        }

        function checkPermissions() {
            const forbiddenPanel = document.getElementById("forbidden-panel");
            const mainContent = document.getElementById("main-content-layout");
            const addItemPanel = document.getElementById("add-item-panel");
            const hasSupplierAccess = (simulatedRole === "svp" || simulatedRole === "ceo");

            if (currentSource === "supplier" && !hasSupplierAccess) {
                forbiddenPanel.style.display = "flex";
                mainContent.style.display = "none";
            } else {
                forbiddenPanel.style.display = "none";
                mainContent.style.display = "grid";
                addItemPanel.style.display = hasSupplierAccess ? "block" : "none";
                renderItems();
                renderMovementHistory();
            }
        }

        function switchSource(source) {
            currentSource = source;
            document.getElementById("tab-warlok").classList.toggle("active", source === "warlok");
            document.getElementById("tab-supplier").classList.toggle("active", source === "supplier");
            selectedItem = null;
            document.getElementById("move-item-display").value = "";
            document.getElementById("move-item-id").value = "";
            checkPermissions();
        }

        function renderItems() {
            const container = document.getElementById("items-grid-container");
            container.innerHTML = "";
            const items = currentSource === "warlok" ? warlokItems : supplierItems;
            if (items.length === 0) { container.innerHTML = `<div style="grid-column: 1/-1; padding: 20px; color: var(--text-muted);">Tidak ada barang.</div>`; return; }
            items.forEach(item => {
                const card = document.createElement("div");
                card.className = `inv-card ${selectedItem && selectedItem.id === item.id ? "selected" : ""}`;
                card.innerHTML = `
                    <i class="ph-fill ${item.icon || "ph-package"} inv-icon"></i>
                    <div class="inv-name">${item.name}</div>
                    <div class="inv-qty">${item.qty} Pcs</div>
                    <button class="btn-select-card ${selectedItem && selectedItem.id === item.id ? "active" : ""}" onclick="selectItem('${item.id}')">
                        ${selectedItem && selectedItem.id === item.id ? "Terpilih" : "Pilih Barang"}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function selectItem(id) {
            const items = currentSource === "warlok" ? warlokItems : supplierItems;
            selectedItem = items.find(item => item.id === id);
            document.getElementById("move-item-display").value = selectedItem.name;
            document.getElementById("move-item-id").value = selectedItem.id;
            renderItems();
        }

        function handleMovementSubmit(event) {
            event.preventDefault();
            if (!selectedItem) { alert("Harap pilih barang terlebih dahulu dari panel kiri!"); return; }
            const type = document.getElementById("move-type").value;
            const qty = parseInt(document.getElementById("move-qty").value);
            const notes = document.getElementById("move-notes").value || "Tanpa catatan";
            if (qty <= 0) { alert("Jumlah mutasi harus lebih besar dari 0!"); return; }
            if (type === "OUT" && selectedItem.qty - qty < 0) { alert("Mutasi gagal! Stok tidak boleh negatif."); return; }

            if (type === "IN") selectedItem.qty += qty; else selectedItem.qty -= qty;

            if (currentSource === "warlok") localStorage.setItem('velmont_inventory_warlok', JSON.stringify(warlokItems));
            else localStorage.setItem('velmont_inventory_supplier', JSON.stringify(supplierItems));

            movementLogs.unshift({ item: selectedItem.name, source: currentSource, type, qty, notes, time: "Baru saja" });
            localStorage.setItem('velmont_inventory_logs', JSON.stringify(movementLogs));

            alert(`Mutasi stok ${selectedItem.name} berhasil disimpan!`);
            document.getElementById("move-qty").value = "";
            document.getElementById("move-notes").value = "";
            renderItems();
            renderMovementHistory();
        }

        function handleAddItemSubmit(event) {
            event.preventDefault();
            const name = document.getElementById("new-item-name").value.trim().toUpperCase();
            const qty = parseInt(document.getElementById("new-item-qty").value);
            if (!name) return;
            const items = currentSource === "warlok" ? warlokItems : supplierItems;
            if (items.some(item => item.name === name)) { alert("Barang dengan nama tersebut sudah ada!"); return; }
            const newItem = { id: (currentSource === "warlok" ? "w" : "s") + Date.now(), name, qty, icon: "ph-package" };
            items.push(newItem);
            if (currentSource === "warlok") localStorage.setItem('velmont_inventory_warlok', JSON.stringify(warlokItems));
            else localStorage.setItem('velmont_inventory_supplier', JSON.stringify(supplierItems));
            if (qty > 0) {
                movementLogs.unshift({ item: name, source: currentSource, type: "IN", qty, notes: "Stok awal pembuatan item baru", time: "Baru saja" });
                localStorage.setItem('velmont_inventory_logs', JSON.stringify(movementLogs));
            }
            alert(`Barang ${name} berhasil ditambahkan!`);
            document.getElementById("add-item-form").reset();
            renderItems();
            renderMovementHistory();
        }

        function renderMovementHistory() {
            const container = document.getElementById("movement-history-container");
            container.innerHTML = "";
            const filteredLogs = movementLogs.filter(log => log.source === currentSource);
            if (filteredLogs.length === 0) { container.innerHTML = `<div style="font-size: 0.75rem; text-align:center; padding:10px; color:var(--text-muted);">Belum ada riwayat mutasi.</div>`; return; }
            filteredLogs.forEach(log => {
                const item = document.createElement("div");
                item.className = "movement-item";
                const badge = log.type === "IN" ? `<span class="m-in">[IN]</span>` : `<span class="m-out">[OUT]</span>`;
                item.innerHTML = `<div>${badge} <strong>${log.item}</strong> (${log.qty} pcs)<div style="font-size:0.7rem; color:var(--text-muted);">${log.notes}</div></div><div style="font-size:0.7rem; color:var(--text-muted);">${log.time}</div>`;
                container.appendChild(item);
            });
        }

        changeSimulatedRole();
    </script>
</body>
</html>
