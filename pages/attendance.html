<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmont Resto | Detail Absensi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-dark: #1E1512; --bg-warm: #3A261D; --panel-bg: #FDF8F5;
            --panel-border: #4A332A; --panel-header: #4A332A; --text-main: #4A332A;
            --text-muted: #9A7B6D; --accent-primary: #D66D40; --accent-shadow: #B25028;
            --accent-yellow: #F4BA41; --accent-green: #5D8A56; --accent-blue: #4A90E2;
            --input-bg: #FFFFFF; --input-border: #E8D8D0; --font-game: 'Nunito', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-warm) 0%, var(--bg-dark) 100%);
            color: var(--text-main); font-family: var(--font-game); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 20px;
        }
        .particle { position:absolute; background:rgba(253,248,245,0.3); border-radius:50%; pointer-events:none; animation:floatUp infinite linear; }
        @keyframes floatUp { 0%{transform:translateY(100vh) scale(0.5);opacity:0} 30%{opacity:0.6} 70%{opacity:0.6} 100%{transform:translateY(-10vh) scale(1.5);opacity:0} }
        .p1{width:6px;height:6px;left:15%;animation-duration:14s}
        .p2{width:10px;height:10px;left:35%;animation-duration:19s;animation-delay:4s}
        .p3{width:5px;height:5px;left:65%;animation-duration:11s;animation-delay:2s}
        .p4{width:12px;height:12px;left:82%;animation-duration:22s;animation-delay:7s;background:rgba(244,186,65,0.15)}
        .p5{width:8px;height:8px;left:55%;animation-duration:16s;animation-delay:9s}

        .game-window { width:100%; max-width:850px; animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes popIn { 0%{transform:scale(0.85) translateY(30px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1} }

        .game-ui-card { background-color:var(--panel-bg); border:4px solid var(--panel-border); border-radius:24px; box-shadow:0 10px 0 var(--panel-border),0 20px 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; overflow:hidden; }
        .window-header { background-color:var(--panel-header); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid var(--panel-border); }
        .window-dots { display:flex; gap:6px; }
        .dot { width:12px; height:12px; border-radius:50%; background-color:var(--panel-bg); opacity:0.5; border:2px solid rgba(0,0,0,0.2); }
        .dot:nth-child(1){background-color:#FF5F56;opacity:1}
        .dot:nth-child(2){background-color:#FFBD2E;opacity:1}
        .dot:nth-child(3){background-color:#27C93F;opacity:1}
        .window-title { color:var(--panel-bg); font-size:0.8rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }

        .card-body { padding:2rem; display:flex; flex-direction:column; height:85vh; max-height:750px; overflow-y:auto; }
        .card-body::-webkit-scrollbar{width:8px} .card-body::-webkit-scrollbar-thumb{background:var(--input-border);border-radius:10px}

        .page-title { font-size:1.8rem; font-weight:900; color:var(--text-main); margin-bottom:1rem; display:flex; align-items:center; gap:10px; }

        .tester-bar { background:#FFF9C4; border:3px solid var(--accent-yellow); border-radius:16px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:15px; flex-wrap:wrap; }
        .tester-title { font-size:0.85rem; font-weight:900; color:var(--panel-border); text-transform:uppercase; display:flex; align-items:center; gap:6px; }

        .grid-layout { display:grid; grid-template-columns:1.5fr 1fr; gap:20px; margin-bottom:20px; }
        @media(max-width:768px){.grid-layout{grid-template-columns:1fr}}

        .panel-box { background:var(--input-bg); border:3px solid var(--input-border); border-radius:20px; padding:20px; box-shadow:0 4px 0 rgba(0,0,0,0.02); }
        .panel-title { font-size:1.1rem; font-weight:900; margin-bottom:15px; display:flex; align-items:center; gap:8px; color:var(--text-main); }

        .form-group { margin-bottom:15px; }
        .form-group label { display:block; font-size:0.8rem; font-weight:800; margin-bottom:6px; color:var(--text-main); }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:10px 14px; border:3px solid var(--input-border); border-radius:12px; font-family:var(--font-game); font-weight:700; color:var(--text-main); outline:none; transition:border-color 0.2s; }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--panel-border)}

        .btn-game { padding:12px 20px; color:white; font-weight:900; font-size:1rem; font-family:var(--font-game); text-transform:uppercase; letter-spacing:1px; border:3px solid var(--panel-border); border-radius:14px; cursor:pointer; transition:all 0.1s ease; display:inline-flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 5px 0 var(--panel-border); }
        .btn-game:active{transform:translateY(5px);box-shadow:0 0px 0 transparent;margin-bottom:5px}
        .btn-primary { background:var(--accent-primary); box-shadow:0 5px 0 var(--accent-shadow); border-color:var(--panel-border); }

        .data-table { width:100%; border-collapse:separate; border-spacing:0; }
        .data-table th,.data-table td { padding:12px; text-align:left; border-bottom:2px dashed var(--input-border); }
        .data-table th { color:var(--text-muted); font-weight:900; text-transform:uppercase; font-size:0.8rem; }
        .data-table td { font-weight:700; color:var(--text-main); font-size:0.9rem; }

        .badge-status { font-size:0.7rem; font-weight:900; padding:2px 8px; border-radius:6px; text-transform:uppercase; }
        .badge-working  { background:#E8F5E9; color:var(--accent-green); border:1.5px solid var(--accent-green); }
        .badge-completed{ background:#FFF3E0; color:var(--accent-primary); border:1.5px solid var(--accent-primary); }
        .badge-autoclose{ background:#FFEBEE; color:#C62828; border:1.5px solid #C62828; }

        .clock-section { display:flex; align-items:center; justify-content:space-between; background:#E8F5E9; border:3px solid var(--accent-green); border-radius:16px; padding:15px; margin-bottom:20px; }
        .clock-title { font-weight:900; color:var(--accent-green); font-size:1.1rem; }
        .clock-subtitle { font-size:0.85rem; font-weight:700; color:#4A6E44; }

        .bottom-actions { margin-top:auto; padding-top:1.5rem; border-top:3px dashed var(--input-border); display:flex; justify-content:space-between; align-items:center; }
        .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); text-decoration:none; font-size:0.9rem; font-weight:800; }
        .back-link:hover{color:var(--accent-primary)}
    </style>
</head>
<body>

    <div class="particle p1"></div><div class="particle p2"></div>
    <div class="particle p3"></div><div class="particle p4"></div><div class="particle p5"></div>

    <div class="game-window">
        <div class="game-ui-card">

            <div class="window-header">
                <div class="window-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="window-title">Attendance_System.exe</div>
                <div class="window-dots" style="visibility:hidden"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>

            <div class="card-body">

                <!-- Simulator Bar -->
                <div class="tester-bar">
                    <div class="tester-title"><i class="ph-bold ph-shield-check"></i> SIMULATOR HAK AKSES PENGGUNA (ROLE MATRIX)</div>
                    <div>
                        <select id="role-selector" onchange="changeSimulatedRole()" style="padding:6px 12px;font-family:var(--font-game);font-weight:800;border-radius:8px;border:2px solid var(--panel-border)">
                            <option value="intern">Lance El Sailor (Intern - Lvl 0)</option>
                            <option value="senior-chef">Silas Veyron (Senior Chef - Lvl 2)</option>
                            <option value="manager" selected>Valerie Swan (Manajer - Lvl 5)</option>
                            <option value="ceo">Moza Leonardo (CEO - Lvl 6)</option>
                        </select>
                    </div>
                </div>

                <h1 class="page-title"><i class="ph-fill ph-clock-user" style="color:var(--accent-primary)"></i> Detail Absensi Karyawan</h1>

                <!-- Clock In/Out Panel -->
                <div class="clock-section" id="clock-section-bg">
                    <div>
                        <div class="clock-title" id="clock-title-text"><i class="ph-fill ph-check-circle"></i> Sesi Aktif Berjalan</div>
                        <div class="clock-subtitle" id="clock-subtitle-text">Shift aktif Anda sedang berjalan sejak pukul 08:15.</div>
                    </div>
                    <button class="btn-game btn-primary" id="btn-clock-action"
                        style="background:#E74C3C;box-shadow:0 5px 0 #C0392B;border-color:var(--panel-border)"
                        onclick="triggerClockToggle()">
                        <i class="ph-bold ph-hand-tap"></i> Clock Out Shift
                    </button>
                </div>

                <div class="grid-layout">
                    <!-- Attendance Log -->
                    <div class="panel-box">
                        <div class="panel-title"><i class="ph-bold ph-article" style="color:var(--accent-blue)"></i> Riwayat Absensi</div>
                        <div style="overflow-x:auto">
                            <table class="data-table" id="attendance-table">
                                <thead>
                                    <tr>
                                        <th>Karyawan</th><th>Tanggal</th>
                                        <th>Clock In / Out</th><th>Durasi</th><th>Status / Adj</th>
                                    </tr>
                                </thead>
                                <tbody id="attendance-tbody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Manual Correction Form -->
                    <div class="panel-box">
                        <div class="panel-title"><i class="ph-bold ph-note-pencil" style="color:var(--accent-primary)"></i> Koreksi Absensi</div>
                        <form id="adjustment-form" onsubmit="handleAdjustmentSubmit(event)">
                            <div class="form-group" id="user-selection-group">
                                <label for="adj-user">Pilih Karyawan</label>
                                <select id="adj-user" required></select>
                            </div>
                            <div class="form-group">
                                <label for="adj-date">Tanggal Absensi</label>
                                <input type="date" id="adj-date" required>
                            </div>
                            <div class="form-group">
                                <label for="adj-hours">Penyesuaian Durasi (Jam)</label>
                                <input type="number" id="adj-hours" step="0.5" placeholder="misal: 8" required min="1" max="18">
                            </div>
                            <div class="form-group">
                                <label for="adj-notes">Catatan Koreksi (Wajib)</label>
                                <textarea id="adj-notes" rows="3" placeholder="Sebutkan alasan penyesuaian..." required></textarea>
                            </div>
                            <button type="submit" class="btn-game btn-primary" style="width:100%">
                                <i class="ph-bold ph-floppy-disk"></i> Simpan Koreksi
                            </button>
                        </form>
                    </div>
                </div>

                <div class="bottom-actions">
                    <a href="dashboard.html" class="back-link"><i class="ph-bold ph-arrow-left"></i> Kembali ke Dashboard</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        const defaultAttendanceData = [
            { id: 1, name: "Valerie Swan",   role: "manager",     date: "25 Mei 2026", in: "08:15 WIB", out: "Aktif",         duration: "9j 15m", status: "working",   notes: "" },
            { id: 2, name: "Lance El Sailor",role: "intern",      date: "24 Mei 2026", in: "08:00 WIB", out: "16:00 WIB",    duration: "8j 0m",  status: "completed", notes: "" },
            { id: 3, name: "Silas Veyron",   role: "senior-chef", date: "24 Mei 2026", in: "07:50 WIB", out: "16:00 WIB",    duration: "8j 10m", status: "completed", notes: "" },
            { id: 4, name: "Valerie Swan",   role: "manager",     date: "24 Mei 2026", in: "08:00 WIB", out: "17:00 WIB",    duration: "9j 0m",  status: "completed", notes: "" },
            { id: 5, name: "Silas Veyron",   role: "senior-chef", date: "23 Mei 2026", in: "08:00 WIB", out: "18 Jam (Sistem)", duration: "-",   status: "autoclose", notes: "Auto Clock-out melebihi 18 jam" },
            { id: 6, name: "Lance El Sailor",role: "intern",      date: "23 Mei 2026", in: "08:10 WIB", out: "16:10 WIB",    duration: "8j 0m",  status: "completed", notes: "Koreksi manual: +0.5 Jam (Lembur bersih-bersih dapur)" }
        ];

        let allAttendanceData = JSON.parse(localStorage.getItem('velmont_attendance'));
        if (!allAttendanceData) {
            allAttendanceData = defaultAttendanceData;
            localStorage.setItem('velmont_attendance', JSON.stringify(allAttendanceData));
        }

        let currentRole = "manager";
        let isClockedIn  = true;

        function changeSimulatedRole() {
            currentRole = document.getElementById("role-selector").value;
            renderAttendanceList();
            renderAdjustmentFormOptions();
        }

        function renderAttendanceList() {
            const tbody = document.getElementById("attendance-tbody");
            tbody.innerHTML = "";
            const isManager = currentRole === "manager" || currentRole === "ceo";
            const filtered  = isManager ? allAttendanceData : allAttendanceData.filter(i => i.role === currentRole);

            filtered.forEach(item => {
                const tr = document.createElement("tr");
                let badgeClass = "badge-completed", statusLabel = "Selesai";
                if (item.status === "working")   { badgeClass = "badge-working";   statusLabel = "Shift Berjalan"; }
                if (item.status === "autoclose") { badgeClass = "badge-autoclose"; statusLabel = "Auto Close"; }

                const nameTd = isManager
                    ? `<td><strong>${item.name}</strong></td>`
                    : `<td><strong>Anda</strong></td>`;

                tr.innerHTML = `
                    ${nameTd}
                    <td>${item.date}</td>
                    <td><span style="color:var(--accent-green)">${item.in}</span> / <span style="color:var(--accent-shadow)">${item.out}</span></td>
                    <td>${item.duration}</td>
                    <td>
                        <span class="badge-status ${badgeClass}">${statusLabel}</span>
                        ${item.notes ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${item.notes}</div>` : ""}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderAdjustmentFormOptions() {
            const group    = document.getElementById("user-selection-group");
            const selectEl = document.getElementById("adj-user");
            selectEl.innerHTML = "";
            const isManager = currentRole === "manager" || currentRole === "ceo";

            if (isManager) {
                group.style.display = "block";
                ["Valerie Swan","Lance El Sailor","Silas Veyron","Moza Leonardo"].forEach(name => {
                    const opt = document.createElement("option");
                    opt.value = name; opt.textContent = name;
                    selectEl.appendChild(opt);
                });
            } else {
                group.style.display = "none";
                const opt = document.createElement("option");
                const ownName = currentRole === "intern" ? "Lance El Sailor" : "Silas Veyron";
                opt.value = ownName; opt.textContent = ownName;
                selectEl.appendChild(opt);
            }
        }

        function triggerClockToggle() {
            const bg       = document.getElementById("clock-section-bg");
            const title    = document.getElementById("clock-title-text");
            const subtitle = document.getElementById("clock-subtitle-text");
            const btn      = document.getElementById("btn-clock-action");

            if (isClockedIn) {
                bg.style.background = "#FFEBEE"; bg.style.borderColor = "#FF5F56";
                title.innerHTML = `<i class="ph-fill ph-x-circle" style="color:#FF5F56"></i> Shift Selesai / Belum Absen`;
                title.style.color = "#FF5F56";
                subtitle.innerText = "Anda belum memulai shift kerja hari ini.";
                btn.innerHTML = `<i class="ph-bold ph-hand-tap"></i> Clock In Shift`;
                btn.style.background = "var(--accent-green)"; btn.style.boxShadow = "0 5px 0 #3E5E39";
                isClockedIn = false;
            } else {
                bg.style.background = "#E8F5E9"; bg.style.borderColor = "var(--accent-green)";
                title.innerHTML = `<i class="ph-fill ph-check-circle" style="color:var(--accent-green)"></i> Sesi Aktif Berjalan`;
                title.style.color = "var(--accent-green)";
                subtitle.innerText = "Shift aktif Anda sedang berjalan.";
                btn.innerHTML = `<i class="ph-bold ph-hand-tap"></i> Clock Out Shift`;
                btn.style.background = "#E74C3C"; btn.style.boxShadow = "0 5px 0 #C0392B";
                isClockedIn = true;
            }
        }

        function handleAdjustmentSubmit(event) {
            event.preventDefault();
            const user     = document.getElementById("adj-user").value;
            const dateVal  = document.getElementById("adj-date").value;
            const hoursVal = document.getElementById("adj-hours").value;
            const notesVal = document.getElementById("adj-notes").value;

            if (!notesVal.trim()) { alert("Catatan penyesuaian wajib diisi!"); return; }

            const formattedDate = new Date(dateVal).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });

            allAttendanceData.unshift({
                id: Date.now(), name: user, role: currentRole,
                date: formattedDate, in: "Koreksi", out: "Manual",
                duration: hoursVal + "j 0m", status: "completed",
                notes: "Koreksi manual: " + notesVal
            });
            localStorage.setItem('velmont_attendance', JSON.stringify(allAttendanceData));

            alert(`Sukses menambahkan koreksi absensi untuk ${user}!`);
            document.getElementById("adjustment-form").reset();
            renderAttendanceList();
            renderAdjustmentFormOptions();
        }

        changeSimulatedRole();
    </script>
</body>
</html>
