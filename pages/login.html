<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmont Resto | Login Kru (Cozy Game Style)</title>
    
    <!-- Google Fonts: Nunito is perfect for bubbly, cozy game UIs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Cozy Game UI Variables - Neat & Polished */
        :root {
            /* Background Atmosphere */
            --bg-dark: #1E1512;       /* Deep coffee black */
            --bg-warm: #3A261D;       /* Warm roasted brown */
            
            /* Game UI Panel */
            --panel-bg: #FDF8F5;      /* Warm milky cream */
            --panel-border: #4A332A;  /* Solid chocolate */
            --panel-header: #4A332A;  /* Match border for header */
            
            /* Text & Accents */
            --text-main: #4A332A;
            --text-muted: #9A7B6D;
            --accent-primary: #D66D40; /* Cozy terracotta / baked clay */
            --accent-shadow: #B25028;  /* Darker terracotta for 3D */
            --accent-yellow: #F4BA41;  /* Soft star yellow */
            
            /* Inputs */
            --input-bg: #FFFFFF;
            --input-border: #E8D8D0;
            
            --font-game: 'Nunito', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-warm) 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: var(--font-game);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Particles (Cozy cafe steam/stars) */
        .particle {
            position: absolute;
            background: rgba(253, 248, 245, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp infinite linear;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            30% { opacity: 0.6; }
            70% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .p1 { width: 6px; height: 6px; left: 15%; animation-duration: 14s; animation-delay: 0s; }
        .p2 { width: 10px; height: 10px; left: 35%; animation-duration: 19s; animation-delay: 4s; }
        .p3 { width: 5px; height: 5px; left: 65%; animation-duration: 11s; animation-delay: 2s; }
        .p4 { width: 12px; height: 12px; left: 82%; animation-duration: 22s; animation-delay: 7s; background: rgba(244, 186, 65, 0.15); }
        .p5 { width: 8px; height: 8px; left: 55%; animation-duration: 16s; animation-delay: 9s; }

        /* Game Dialog Window wrapper */
        .game-window {
            width: 100%;
            max-width: 380px;
            margin: 0 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.85) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* The actual card */
        .game-ui-card {
            background-color: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 24px;
            /* Neat 3D shadow */
            box-shadow: 0 10px 0 var(--panel-border), 0 20px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keeps the header rounded neatly */
        }

        /* Game Window Header Bar */
        .window-header {
            background-color: var(--panel-header);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--panel-border);
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--panel-bg);
            opacity: 0.5;
            border: 2px solid rgba(0,0,0,0.2);
        }
        .dot:nth-child(1) { background-color: #FF5F56; opacity: 1;}
        .dot:nth-child(2) { background-color: #FFBD2E; opacity: 1;}
        .dot:nth-child(3) { background-color: #27C93F; opacity: 1;}

        .window-title {
            color: var(--panel-bg);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Card Content Area */
        .card-body {
            padding: 2.5rem 2rem;
            text-align: center;
        }

        /* Icon / Avatar */
        .cafe-icon-wrapper {
            width: 70px;
            height: 70px;
            background: var(--input-bg);
            border: 4px solid var(--panel-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 4px 0 var(--input-border);
            transform: rotate(-3deg);
        }

        .cafe-icon-wrapper i {
            font-size: 2.2rem;
            color: var(--accent-primary);
        }

        /* Typography */
        .brand-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 0.5px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent-yellow);
            color: var(--panel-border);
            font-size: 0.75rem;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 12px;
            border: 2px solid var(--panel-border);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        /* Input Fields */
        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.4rem;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
            z-index: 2;
            transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--input-bg);
            border: 3px solid var(--input-border);
            border-radius: 16px;
            color: var(--text-main);
            font-family: var(--font-game);
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-group input::placeholder {
            color: #C2B6AE;
            font-weight: 600;
        }

        .form-group input:focus {
            border-color: var(--panel-border);
            background: var(--input-bg);
        }

        .form-group input:focus + i {
            color: var(--accent-primary);
        }

        /* The Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 1.5rem;
            background: var(--accent-primary);
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            font-family: var(--font-game);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 4px solid var(--panel-border);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            /* Neat 3D Button Effect */
            box-shadow: 0 6px 0 var(--accent-shadow);
            transform: translateY(0);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
        }

        .btn-submit:hover {
            background: #E3794D;
        }

        /* Satisfying Click / Push state */
        .btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--accent-shadow);
            margin-bottom: 6px; /* Keep layout stable when clicked */
        }

        /* Footer Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            transition: color 0.2s;
            width: 100%;
        }

        .back-link:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <!-- Ambient Floating Particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>

    <!-- Main Wrapper -->
    <div class="game-window">
        <div class="game-ui-card">
            
            <!-- Window Style Header -->
            <div class="window-header">
                <div class="window-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="window-title">Velmont.exe</div>
                <div class="window-dots" style="visibility: hidden;">
                    <!-- Spacer for centering title perfectly -->
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <!-- Card Content -->
            <div class="card-body">
                
                <div class="cafe-icon-wrapper">
                    <i class="ph-fill ph-coffee"></i>
                </div>
                
                <h1 class="brand-title">VELMONT</h1>
                <div class="brand-badge">
                    <i class="ph-fill ph-storefront"></i> Shift Kru
                </div>

                <form onsubmit="handleLogin(event)">
                    
                    <div class="form-group">
                        <label>Pilih Akun / Role Simulator</label>
                        <div class="input-wrapper">
                            <select id="login-role" style="width: 100%; padding: 12px 16px 12px 44px; background: var(--input-bg); border: 3px solid var(--input-border); border-radius: 16px; color: var(--text-main); font-family: var(--font-game); font-size: 1rem; font-weight: 700; outline: none; appearance: none; cursor: pointer;" required>
                                <option value="ceo">Moza Leonardo (CEO - Lvl 6)</option>
                                <option value="manager">Valerie Swan (Manajer - Lvl 5)</option>
                                <option value="svp">Kael Percival (SVP - Lvl 4)</option>
                                <option value="supplier">Winston Stark (Supplier - Lvl 4)</option>
                                <option value="warlok">Budi Warlok (Intern - Lvl 1)</option>
                            </select>
                            <i class="ph-bold ph-shield-check"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Kode Sandi Cepat</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" placeholder="Bebas isi apa saja (Demo)" required autocomplete="current-password">
                            <i class="ph-bold ph-lock-key"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        <span id="btn-text">Mulai Kerja</span>
                        <i class="ph-bold ph-play"></i>
                    </button>
                    
                </form>

                <script>
                    function handleLogin(event) {
                        event.preventDefault();
                        const btnText = document.getElementById('btn-text');
                        btnText.innerText = 'Menghubungkan...';
                        
                        const chosenRole = document.getElementById('login-role').value;
                        localStorage.setItem('velmont_session_role', chosenRole);
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 800);
                    }
                </script>

                <a href="../index.html" class="back-link">
                    <i class="ph-bold ph-arrow-u-up-left"></i> Kembali ke Menu Utama
                </a>

            </div>
        </div>
    </div>

</body>
</html>
