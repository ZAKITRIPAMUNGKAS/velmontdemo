<!DOCTYPE html>
<html lang="id">
<head>
        <link rel="icon" href="../assets/logo.png" type="image/png">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmont Resto | 404 Tidak Ditemukan</title>
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Cozy Game UI Variables - Neat & Polished */
        :root {
            --bg-dark: #1E1512;       
            --bg-warm: #3A261D;       
            --panel-bg: #FDF8F5;      
            --panel-border: #4A332A;  
            --panel-header: #4A332A;  
            --text-main: #4A332A;
            --text-muted: #9A7B6D;
            --accent-primary: #D66D40; 
            --accent-shadow: #B25028;  
            --accent-yellow: #F4BA41;  
            --accent-green: #5D8A56;
            --accent-blue: #4A90E2;
            --input-bg: #FFFFFF;
            --input-border: #E8D8D0;
            --font-game: 'Nunito', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-warm) 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: var(--font-game);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Ambient Floating Particles */
        .particle {
            position: absolute;
            background: rgba(253, 248, 245, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp infinite linear;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            30% { opacity: 0.6; }
            70% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .p1 { width: 6px; height: 6px; left: 15%; animation-duration: 14s; animation-delay: 0s; }
        .p2 { width: 10px; height: 10px; left: 35%; animation-duration: 19s; animation-delay: 4s; }
        .p3 { width: 5px; height: 5px; left: 65%; animation-duration: 11s; animation-delay: 2s; }
        .p4 { width: 12px; height: 12px; left: 82%; animation-duration: 22s; animation-delay: 7s; background: rgba(244, 186, 65, 0.15); }
        .p5 { width: 8px; height: 8px; left: 55%; animation-duration: 16s; animation-delay: 9s; }

        /* Game Dialog Window wrapper */
        .game-window {
            width: 100%;
            max-width: 450px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.85) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* The actual card */
        .game-ui-card {
            background-color: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: 0 10px 0 var(--panel-border), 0 20px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Game Window Header Bar */
        .window-header {
            background-color: var(--panel-header);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--panel-border);
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--panel-bg);
            opacity: 0.5;
            border: 2px solid rgba(0,0,0,0.2);
        }
        .dot:nth-child(1) { background-color: #FF5F56; opacity: 1;}
        .dot:nth-child(2) { background-color: #FFBD2E; opacity: 1;}
        .dot:nth-child(3) { background-color: #27C93F; opacity: 1;}

        .window-title {
            color: var(--panel-bg);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Card Content Area */
        .card-body {
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 404 Illustration Area */
        .error-illustration {
            position: relative;
            margin-bottom: 24px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: var(--input-border);
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 2px 2px 0 #FFFFFF;
        }

        .error-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--accent-primary);
            animation: floatGhost 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 0 rgba(0,0,0,0.1));
        }

        @keyframes floatGhost {
            0%, 100% { transform: translate(-50%, -60%); }
            50% { transform: translate(-50%, -40%); }
        }

        /* Typography */
        .error-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            max-width: 90%;
        }

        /* The Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: white;
            font-weight: 900;
            font-size: 1.05rem;
            font-family: var(--font-game);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 4px solid var(--panel-border);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 0 var(--accent-shadow);
            transform: translateY(0);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
            text-decoration: none;
        }

        .btn-submit:hover {
            background: #E3794D;
        }

        .btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--accent-shadow);
            margin-bottom: 6px; 
        }

    </style>
</head>
<body>

    <!-- Ambient Floating Particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>

    <!-- Main Wrapper -->
    <div class="game-window">
        <div class="game-ui-card">
            
            <!-- Window Style Header -->
            <div class="window-header">
                <div class="window-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="window-title">Error_404.exe</div>
                <div class="window-dots" style="visibility: hidden;">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <!-- Card Content -->
            <div class="card-body">
                
                <div class="error-illustration">
                    <div class="error-code">404</div>
                    <i class="ph-fill ph-ghost error-icon"></i>
                </div>
                
                <h1 class="error-title">Waduh, Salah Meja?</h1>
                <p class="error-desc">
                    Sepertinya ruangan atau menu yang Anda cari tidak ada di Velmont Resto. Yuk, kembali ke area yang benar!
                </p>

                <a href="../index.html" class="btn-submit">
                    <i class="ph-bold ph-storefront"></i> Kembali ke Restoran
                </a>

            </div>
        </div>
    </div>

</body>
</html>
